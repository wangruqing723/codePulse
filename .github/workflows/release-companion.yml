name: Release Companion

on:
  workflow_dispatch:
  push:
    tags:
      - "codepulse-companion-latest"

permissions:
  contents: write

jobs:
  release-macos:
    name: Build and publish macOS companion
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v7
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Resolve release metadata
        id: meta
        shell: bash
        run: |
          VERSION="$(node -p "require('./package.json').version")"
          # Companion 发布使用固定的 latest 指针 tag，与扩展版本解耦。
          TAG="codepulse-companion-latest"

          echo "version=${VERSION}" >> "${GITHUB_OUTPUT}"
          echo "tag=${TAG}" >> "${GITHUB_OUTPUT}"

      - name: Build release artifacts
        run: npm run companion:release:mac

      - name: Verify release artifacts
        shell: bash
        run: |
          test -f release/CodePulse-Companion-darwin-arm64.zip
          test -f release/codepulse-companion-manifest.json
          node -e "const fs=require('fs'); const manifest=JSON.parse(fs.readFileSync('release/codepulse-companion-manifest.json','utf8')); if (!manifest.artifacts?.['darwin-arm64']?.url || !manifest.artifacts['darwin-arm64'].sha256) process.exit(1);"

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.meta.outputs.tag }}
          VERSION: ${{ steps.meta.outputs.version }}
        shell: bash
        run: |
          if gh release view "${TAG}" >/dev/null 2>&1; then
            echo "Release ${TAG} already exists; artifacts will be clobbered."
          else
            gh release create "${TAG}" \
              --title "CodePulse Companion (latest)" \
              --notes "CodePulse Companion latest release (${VERSION})." \
              --latest=false
          fi

      - name: Upload companion artifacts
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.meta.outputs.tag }}
        run: |
          gh release upload "${TAG}" \
            release/CodePulse-Companion-darwin-arm64.zip \
            release/codepulse-companion-manifest.json \
            --clobber
